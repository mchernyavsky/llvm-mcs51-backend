name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      CCACHE_DIR: ~/.cache/ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "6"
      CCACHE_MAXSIZE: "750M"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            clang \
            cmake \
            ninja-build \
            sdcc-ucsim

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pyelftools

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml', 'scripts/build_llvm.py', 'scripts/bootstrap_llvm.py', 'scripts/test.py', 'scripts/common.py', 'overlay/**', 'tests/e2e/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Show ccache configuration
        run: |
          ccache --zero-stats
          ccache --show-config

      - name: Run test suite
        run: make test

      - name: Show ccache statistics
        if: always()
        run: ccache --show-stats
